<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ニュース真偽判定</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
            padding: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .articles {
            margin-top: 15px;
        }
        .articles a {
            display: block;
            margin-bottom: 5px;
            color: blue;
            text-decoration: none;
        }
        .articles a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>ニュース真偽判定（β2.0）</h1>

<form method="POST">
    <textarea name="text" placeholder="ここにニュース本文を貼り付け"></textarea><br>
    <button type="submit">判定</button>
</form>

{% if result %}
<div class="result">
    <h2>判定結果</h2>
    <p><strong>総合スコア:</strong> {{ result.final_score }}</p>
    <p><strong>AIスコア:</strong> {{ result.ai_score }}</p>
    <p><strong>RSS一致度:</strong> {{ result.rss_score }}</p>

    <div class="articles">
        <h3>一致した記事</h3>
        {% if result.articles %}
            {% for article in result.articles %}
                <a href="{{ article.link }}" target="_blank">
                    {{ article.title }}
                </a>
            {% endfor %}
        {% else %}
            <p>一致する記事は見つかりませんでした</p>
        {% endif %}
    </div>
</div>
{% endif %}

</body>
</html>
